name: Version helper

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
    branches:
      - "**"
  push:
    branches:
      - "**"

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: version-helper-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version-check:
    name: Version check
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Calculate version state
        id: version
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BRANCH: ${{ github.head_ref }}
          BASE_BRANCH: ${{ github.base_ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          working_version="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$working_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::VERSION must use MAJOR.FEATURE.BUG format, for example 1.2.3."
            exit 1
          fi

          event_name="${GITHUB_EVENT_NAME}"
          ref_name="${REF_NAME:-}"
          base_branch="${BASE_BRANCH:-main}"
          branch_name="${PR_BRANCH:-$ref_name}"
          is_main_push="false"

          if [ "$event_name" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            is_main_push="true"
          fi

          base_version="$working_version"
          commit_subjects="$(git log --format=%s -1 || true)"

          if [ "$is_main_push" != "true" ]; then
            git fetch origin "${base_branch}" --depth=1

            if git cat-file -e "origin/${base_branch}:VERSION" 2>/dev/null; then
              base_version="$(git show "origin/${base_branch}:VERSION" | tr -d '[:space:]')"
            fi

            commit_subjects="$(git log --format=%s "origin/${base_branch}..HEAD" || true)"
          fi

          if [[ ! "$base_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Base VERSION must use MAJOR.FEATURE.BUG format, for example 1.2.3."
            exit 1
          fi

          signal="$(printf '%s\n%s\n%s\n' "$branch_name" "${PR_TITLE:-}" "$commit_subjects" | tr '[:upper:]' '[:lower:]')"

          change_type="unknown"
          if echo "$signal" | grep -Eq '(^|[[:space:]/:_-])(major|breaking|breaking change)([[:space:]/:_-]|$)|!:'; then
            change_type="major"
          elif echo "$signal" | grep -Eq '(^|[[:space:]/:_-])(feature|feat)([[:space:]/:_-]|$)'; then
            change_type="feature"
          elif echo "$signal" | grep -Eq '(^|[[:space:]/:_-])(bugfix|hotfix|fix|bug|patch)([[:space:]/:_-]|$)'; then
            change_type="bug"
          elif echo "$signal" | grep -Eq '(^|[[:space:]/:_-])(docs|doc|chore|ops)([[:space:]/:_-]|$)'; then
            change_type="none"
          fi

          IFS=. read -r major feature bug <<< "$base_version"

          case "$change_type" in
            major)
              suggested="$((major + 1)).0.0"
              label="Major"
              ;;
            feature)
              suggested="${major}.$((feature + 1)).0"
              label="Feature"
              ;;
            bug)
              suggested="${major}.${feature}.$((bug + 1))"
              label="Bug fix"
              ;;
            none)
              suggested="$base_version"
              label="No release bump"
              ;;
            *)
              suggested=""
              label="Needs a change type"
              ;;
          esac

          version_matches="false"
          if [ -n "$suggested" ] && [ "$working_version" = "$suggested" ]; then
            version_matches="true"
          fi

          tag="v${working_version}"
          create_release="false"
          if [ "$is_main_push" = "true" ]; then
            git fetch --tags --force

            if git rev-parse "${tag}" >/dev/null 2>&1; then
              create_release="false"
            else
              create_release="true"
            fi
          fi

          {
            echo "base_version=${base_version}"
            echo "working_version=${working_version}"
            echo "change_type=${change_type}"
            echo "suggested=${suggested}"
            echo "label=${label}"
            echo "version_matches=${version_matches}"
            echo "is_main_push=${is_main_push}"
            echo "create_release=${create_release}"
            echo "tag=${tag}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Version helper"
            if [ "$is_main_push" = "true" ]; then
              echo "Mode: release tagging from main"
              echo "VERSION: ${working_version}"
              if [ "$create_release" = "true" ]; then
                echo "Release tag to create: ${tag}"
              else
                echo "Release tag already exists: ${tag}"
              fi
            else
              echo "Mode: version suggestion"
              echo "Base version: ${base_version}"
              echo "Branch VERSION: ${working_version}"
              echo "Detected change type: ${label}"
              if [ -n "$suggested" ]; then
                echo "Suggested next version: ${suggested}"
                if [ "$version_matches" = "true" ]; then
                  echo "VERSION is already set correctly."
                else
                  echo "VERSION should be updated before merge."
                fi
              else
                echo "Suggested next version: choose a branch, PR title, or commit prefix such as major, feature, or fix."
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on pull request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          BASE_VERSION: ${{ steps.version.outputs.base_version }}
          WORKING_VERSION: ${{ steps.version.outputs.working_version }}
          SUGGESTED_VERSION: ${{ steps.version.outputs.suggested }}
          CHANGE_TYPE: ${{ steps.version.outputs.change_type }}
          CHANGE_LABEL: ${{ steps.version.outputs.label }}
          VERSION_MATCHES: ${{ steps.version.outputs.version_matches }}
        with:
          script: |
            const marker = '<!-- mpesa-mlp-version-suggestion -->';
            const base = process.env.BASE_VERSION;
            const working = process.env.WORKING_VERSION;
            const suggested = process.env.SUGGESTED_VERSION;
            const label = process.env.CHANGE_LABEL;
            const versionMatches = process.env.VERSION_MATCHES === 'true';

            const examples = [
              '`major/...` or `major:` for breaking changes',
              '`feature/...`, `feat/...`, `feature:`, or `feat:` for feature releases',
              '`bugfix/...`, `hotfix/...`, `fix:`, or `bug:` for bug-fix releases',
            ].join('\n- ');

            const body = suggested
              ? [
                  marker,
                  'Version check:',
                  '',
                  `- Base version: \`${base}\``,
                  `- Branch VERSION: \`${working}\``,
                  `- Detected change type: \`${label}\``,
                  `- Suggested next version: \`${suggested}\``,
                  '',
                  versionMatches
                    ? '`VERSION` is already set to the suggested version.'
                    : `Before merge, update \`VERSION\` to \`${suggested}\` and move the matching notes in \`CHANGELOG.md\`.`,
                ].join('\n')
              : [
                  marker,
                  'Version check:',
                  '',
                  `- Base version: \`${base}\``,
                  `- Branch VERSION: \`${working}\``,
                  '- Detected change type: `Needs a change type`',
                  '',
                  'I could not safely guess the next version. Use one of these signals:',
                  `- ${examples}`,
                ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.data.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Create tag and GitHub release
        if: steps.version.outputs.is_main_push == 'true' && steps.version.outputs.create_release == 'true'
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.version.outputs.working_version }}
          TAG: ${{ steps.version.outputs.tag }}
        with:
          script: |
            const fs = require('fs');
            const version = process.env.VERSION;
            const tag = process.env.TAG;
            const { owner, repo } = context.repo;
            const sha = context.sha;

            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/tags/${tag}`,
              sha,
            });

            let releaseNotes = `Release ${tag}`;
            if (fs.existsSync('CHANGELOG.md')) {
              const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
              const escaped = version.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const section = changelog.match(new RegExp(`## \\[${escaped}\\][\\s\\S]*?(?=\\n## \\[|$)`));
              if (section) {
                releaseNotes = section[0].trim();
              }
            }

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              target_commitish: sha,
              name: tag,
              body: releaseNotes,
            });

      - name: Explain release result
        shell: bash
        run: |
          {
            echo "### Release result"
            if [ "${{ steps.version.outputs.is_main_push }}" = "true" ]; then
              if [ "${{ steps.version.outputs.create_release }}" = "true" ]; then
                echo "Created ${{ steps.version.outputs.tag }} from VERSION."
              else
                echo "${{ steps.version.outputs.tag }} already exists, so no new release was created."
              fi
            else
              echo "No release tag is created until this branch is merged into main."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
